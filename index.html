<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CineRecensioni</title>

  <style>
    :root {
      --gold: #ffbf00;
      --blue: #1b465b;
      --dark: #0f1720;
      --card: #16202a;
      --text: #e6edf3;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--dark);
      color: var(--text);
    }

    header {
      background: linear-gradient(90deg, var(--blue), #0d2c3a);
      padding: 30px;
      text-align: center;
      border-bottom: 2px solid var(--gold);
    }

    header h1 {
      margin: 0;
      color: var(--gold);
      letter-spacing: 1px;
    }

    header p {
      margin-top: 8px;
      opacity: 0.8;
    }

    main {
      padding: 25px;
      max-width: 800px;
      margin: auto;
    }

    .recensione {
      background: var(--card);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      border-left: 4px solid var(--gold);
      transition: 0.2s;
    }

    .recensione:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .recensione h2 {
      margin: 0 0 10px 0;
      color: white;
    }

    .stelle {
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 3px;
    }

    footer {
      text-align: center;
      padding: 15px;
      border-top: 1px solid #222;
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <h1>CineRecensioni</h1>
  <p>Dark. Pulito. Diretto.</p>
</header>

<main>

  <div class="recensione">
    <h2>Oppenheimer</h2>
    <div class="stelle">★★★★★</div>
  </div>

  <div class="recensione">
    <h2>Wonka</h2>
    <div class="stelle">★★★★☆</div>
  </div>

  <div class="recensione">
    <h2>Dune: Parte Due</h2>
    <div class="stelle">★★★★★</div>
  </div>

  <div class="recensione">
    <h2>Barbie</h2>
    <div class="stelle">★★★☆☆</div>
  </div>

</main>

<footer>
  <p>&copy; 2026 CineRecensioni</p>
</footer>

</body>
</html>
