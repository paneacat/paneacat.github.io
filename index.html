<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>paneacult</title>

  <style>
    :root {
      --gold: #ffbf00;
      --blue: #1b465b;
      --dark: #0f1720;
      --card: #16202a;
      --text: #e6edf3;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--dark);
      color: var(--text);
    }

    header {
      background: linear-gradient(90deg, var(--blue), #0d2c3a);
      padding: 30px;
      text-align: center;
      border-bottom: 2px solid var(--gold);
    }

    header h1 {
      margin: 0;
      color: var(--gold);
      letter-spacing: 1px;
    }

    header p {
      margin-top: 8px;
      opacity: 0.8;
    }

    main {
      padding: 25px;
      max-width: 800px;
      margin: auto;
    }

    .recensione {
      background: var(--card);
      margin-bottom: 30px;
      border-radius: 12px;
      overflow: hidden;
      border-left: 4px solid var(--gold);
      transition: 0.2s;
    }

    .recensione:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .cover {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      filter: brightness(0.85);
    }

    .contenuto {
      padding: 20px;
    }

    .titolo {
      font-size: 22px;
      margin-bottom: 5px;
      color: white;
    }

    .meta {
      font-size: 13px;
      opacity: 0.6;
      margin-bottom: 10px;
    }

    .stelle {
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .recensione p {
      line-height: 1.6;
      font-size: 15px;
    }

    .firma {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.7;
      text-align: right;
      border-top: 1px solid #222;
      padding-top: 10px;
    }

    footer {
      text-align: center;
      padding: 15px;
      border-top: 1px solid #222;
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <h1>paneacult</h1>
  <p>My therapist says cinema</p>
</header>

<main>
<a href="dittatore.html" class="link-card">
  <div class="recensione">

    <img class="cover" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/The_Great_Dictator_poster.jpg">

    <div class="contenuto">
      <h2 class="titolo">Cinema che resta #1 Il grande Dittatore</h2>
      <p class="meta">Charlie Chaplin (1940)</p>

      <div class="stelle">★★★★★</div>

      <p class="mini">
        Una satira potentissima che ridicolizza il nazismo e culmina in uno dei discorsi più iconici del cinema.
      </p>

      <span class="leggi">Leggi recensione→</span>
    </div>

  </div>
</a>
</main>

<footer>
  <p>&copy; 2026 paneacult</p>
</footer>

</body>
</html>
