<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>paneacult</title>

  <style>
    body {
      background-color: #1b465b;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #ffbf00;
      margin-bottom: 30px;
    }

    /* FILTRI */
    .filtri {
      text-align: center;
      margin-bottom: 30px;
    }

    .filtro {
      background: transparent;
      color: white;
      border: 1px solid transparent;
      padding: 8px 14px;
      margin: 5px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 14px;
    }

    .filtro:hover {
      color: #ffbf00;
      text-shadow: 0 0 6px rgba(255,191,0,0.6);
    }

    .filtro.attivo {
      color: #ffbf00;
      border-color: #ffbf00;
      box-shadow: 0 0 8px rgba(255,191,0,0.7);
    }

    /* RECENSIONI */
    .container {
      max-width: 800px;
      margin: auto;
    }

    .recensione {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .recensione:hover {
      transform: scale(1.02);
    }

    .recensione.nascosta {
      display: none;
    }

    .tag {
      color: #ffbf00;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <h1>paneacult</h1>

  <!-- FILTRI -->
  <div class="filtri">
    <button class="filtro attivo" data-filtro="tutti">Tutti</button>
    <button class="filtro" data-filtro="drama">Drama</button>
    <button class="filtro" data-filtro="horror">Horror</button>
    <button class="filtro" data-filtro="comedy">Comedy</button>
  </div>

  <!-- RECENSIONI -->
  <div class="container">

    <div class="recensione" data-tag="drama">
      <h3>Film drammatico</h3>
      <p>Intenso e pieno di ritmo.</p>
      <div class="tag">#drammatico</div>
    </div>

    <div class="recensione" data-tag="horror">
      <h3>Film thriller</h3>
      <p>Ansia pura dall’inizio alla fine.</p>
      <div class="tag">#thriller</div>
    </div>

    <div class="recensione" data-tag="comedy">
      <h3>Film commedia</h3>
      <p>Leggero e divertente.</p>
      <div class="tag">#commedia</div>
    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    const filtri = document.querySelectorAll('.filtro');
    const recensioni = document.querySelectorAll('.recensione');

    filtri.forEach(filtro => {
      filtro.addEventListener('click', () => {

        // attivo
        filtri.forEach(f => f.classList.remove('attivo'));
        filtro.classList.add('attivo');

        const categoria = filtro.getAttribute('data-filtro');

        recensioni.forEach(rec => {
          const tags = rec.getAttribute('data-tag');

          if (categoria === "tutti" || tags.includes(categoria)) {
            rec.classList.remove('nascosta');
          } else {
            rec.classList.add('nascosta');
          }
        });

      });
    });
  </script>

</body>
</html>
