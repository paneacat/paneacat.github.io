<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>paneacult</title>

<style>
:root {
  --gold:#ffbf00;
  --dark:#0f1720;
  --card:#16202a;
  --text:#e6edf3;
}

body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:var(--dark);
  color:var(--text);
}

/* HEADER */
header {
  text-align:center;
  padding:30px 20px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

header h1 {
  margin:0;
  color:var(--gold);
}

/* MAIN */
main {
  max-width:1100px;
  margin:auto;
  padding:25px;
}

/* FEATURED */
.featured {
  position:relative;
  border-radius:18px;
  overflow:hidden;
  margin-bottom:30px;
}

.featured img {
  width:100%;
  height:350px;
  object-fit:cover;
  filter:brightness(0.6);
}

.featured-content {
  position:absolute;
  bottom:20px;
  left:20px;
}

.featured h2 {
  margin:0;
  font-size:28px;
}

.featured p {
  opacity:0.8;
}

/* FILTRI */
.filtri {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:25px;
}

.filtri button {
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  padding:8px 16px;
  border-radius:20px;
  cursor:pointer;
}

.filtri .attivo {
  background:var(--gold);
  color:black;
}

/* GRID */
.grid {
  display:grid;
  gap:20px;
}

@media(min-width:600px){
  .grid { grid-template-columns:1fr 1fr; }
}

@media(min-width:900px){
  .grid { grid-template-columns:1fr 1fr 1fr; }
}

/* CARD */
.link-card, .link-card * {
  text-decoration:none;
  color:inherit;
}

.recensione {
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
  transition:0.2s;
}

.recensione:hover {
  transform:translateY(-5px);
}

.cover {
  width:100%;
  height:220px;
  object-fit:cover;
  filter:brightness(0.75);
}

.contenuto {
  padding:20px;
}

.rubrica {
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--gold);
}

.meta {
  font-size:13px;
  opacity:0.5;
}

.stelle {
  color:var(--gold);
  margin:10px 0;
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  opacity:0.5;
}
</style>
</head>

<body>

<header>
  <h1>paneacult</h1>
  <p>My therapist says cinema</p>
</header>

<main>

<!-- ARTICOLO IN EVIDENZA -->
<a href="tramonto.html" class="link-card">
  <div class="featured">
    <img src="img/viale-del-tramonto.jpg">
    <div class="featured-content">
      <p class="rubrica">Cinema che resta</p>
      <h2>Sunset Boulevard</h2>
      <p>Quando Hollywood dimentica le sue star.</p>
    </div>
  </div>
</a>

<!-- FILTRI -->
<div class="filtri">
  <button onclick="filtra('tutti', this)" class="attivo">Tutti</button>
  <button onclick="filtra('resta', this)">Cinema che resta</button>
  <button onclick="filtra('contemporanei', this)">Sguardi contemporanei</button>
</div>

<!-- GRID -->
<div class="grid">

<a href="dittatore.html" class="link-card resta">
  <div class="recensione">
    <img class="cover" src="img/Grandedittatore2.jpg">
    <div class="contenuto">
      <p class="rubrica">Cinema che resta</p>
      <h3>Il grande Dittatore</h3>
      <p class="meta">1940</p>
      <div class="stelle">★★★★★</div>
    </div>
  </div>
</a>

<a href="uncut.html" class="link-card contemporanei">
  <div class="recensione">
    <img class="cover" src="img/uncut.jpg">
    <div class="contenuto">
      <p class="rubrica">Sguardi contemporanei</p>
      <h3>Uncut Gems</h3>
      <p class="meta">2019</p>
      <div class="stelle">★★★★☆</div>
    </div>
  </div>
</a>

</div>

</main>

<footer>© 2026 paneacult</footer>

<script>
function filtra(categoria, btn) {
  const cards = document.querySelectorAll('.link-card');
  const bottoni = document.querySelectorAll('.filtri button');

  bottoni.forEach(b => b.classList.remove('attivo'));
  btn.classList.add('attivo');

  cards.forEach(card => {
    card.style.display = (categoria === 'tutti' || card.classList.contains(categoria)) ? '' : 'none';
  });
}
</script>

</body>
</html>
